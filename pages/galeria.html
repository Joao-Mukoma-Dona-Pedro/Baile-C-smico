<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Dinâmica</title>
    <link rel="stylesheet" href="../style/galeria.css">
</head>
<body>
    <h1>Minha Galeria</h1>

    <div class="galeria">
        <img src="../images/Foto 1.jpeg" alt="Foto 1">
        <img src="../images/Foto 2.jpeg" alt="Foto 2">
        <img src="../images/Foto 3.jpeg" alt="Foto 3">
        <img src="../images/Foto 4.jpeg" alt="Foto 4">
        <img src="../images/Foto 5.jpeg" alt="Foto 5">
        <img src="../images/Foto 6.jpeg" alt="Foto 6">
        <img src="../images/Foto 7.jpeg" alt="Foto 7">
        <img src="../images/Foto 8.jpeg" alt="Foto 8">
        <img src="../images/Foto 9.jpeg" alt="Foto 9">
        <img src="../images/Foto 10.jpeg" alt="Foto 10">
        <img src="../images/Foto 11.jpeg" alt="Foto 11">
        <img src="../images/Foto 12.jpeg" alt="Foto 12">
        <img src="../images/Foto 13.jpeg" alt="Foto 13">
        <img src="../images/Foto 14.jpeg" alt="Foto 14">
        <img src="../images/Foto 15.jpeg" alt="Foto 15">
        <img src="../images/Foto 16.jpeg" alt="Foto 16">
        <img src="../images/Foto 17.jpeg" alt="Foto 17">
        <img src="../images/Foto 18.jpeg" alt="Foto 18">
        <img src="../images/Foto 19.jpeg" alt="Foto 19">
        <img src="../images/Foto 20.jpeg" alt="Foto 20">
        <img src="../images/foto21.jpeg" alt="Foto 21">
        <img src="../images/foto22.jpeg" alt="Foto 22">
        <img src="../images/foto23.jpeg" alt="Foto 23">
        <img src="../images/foto24.jpeg" alt="Foto 24">
        <img src="../images/foto25.jpeg" alt="Foto 25">
        <img src="../images/foto26.jpeg" alt="Foto 26">
        <img src="../images/foto27.jpeg" alt="Foto 27">
        <img src="../images/foto28.jpeg" alt="Foto 28">
        <img src="../images/foto29.jpeg" alt="Foto 29">
        <img src="../images/foto30.jpeg" alt="Foto 30">
    </div>

    <div class="modal" id="modal">
        <div class="topo-modal">
            <div class="contador" id="contador">1 / 30</div>
            <div class="acoes">
                <button class="btn" id="playPause">Play</button>
                <button class="btn" id="fullscreen">Tela cheia</button>
                <button class="btn fechar" id="fechar">&times;</button>
            </div>
        </div>

        <div class="conteudo-modal">
            <button class="nav prev" id="prev">&#10094;</button>
            <img class="modal-img" id="modal-img" src="" alt="">
            <button class="nav next" id="next">&#10095;</button>
        </div>

        <p class="legenda" id="legenda"></p>
        <div class="miniaturas" id="miniaturas"></div>
    </div>

    <script src="../js/galeria.js"></script>
</body>
</html>
